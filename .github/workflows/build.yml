# ---------------------------------------------------------------------------
# WinCache CI — Build kernel driver (cacheflt.sys) and management tool
#
# Triggered on push/PR to main, or manually via the "Actions" tab.
# Downloads compiled artifacts from the summary page after the build finishes.
# ---------------------------------------------------------------------------

name: Build WinCache

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:   # allow manual trigger from Actions tab

jobs:
  build:
    name: Build (x64 Release)
    runs-on: windows-2022

    steps:
      # ------------------------------------------------------------------
      # Step 2: Checkout source code
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Step 3: Set up the build environment (VS + SDK paths)
      #
      # We use cl.exe/link.exe directly — no MSBuild, no WDK installer needed.
      # The windows-2022 runner image already has:
      #   - Visual Studio 2022 with C++ tools
      #   - Windows SDK with WDK headers (km/, wdf/) and libs
      # We just need to set INCLUDE, LIB, and PATH correctly.
      # ------------------------------------------------------------------
      - name: Set up build environment
        shell: pwsh
        run: |
          # Locate VS and SDK versions
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -property installationPath
          $vcTools = Get-ChildItem "$vsPath\VC\Tools\MSVC" -Directory `
            | Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty Name
          $sdkRoot = "${env:ProgramFiles(x86)}\Windows Kits\10"
          $sdkVer  = Get-ChildItem "$sdkRoot\Include" -Directory `
            | Where-Object { $_.Name -match '^10\.0\.\d+\.\d+$' } `
            | Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty Name

          Write-Host "VS:       $vsPath"
          Write-Host "VC Tools: $vcTools"
          Write-Host "SDK:      $sdkVer"

          $vcBin    = "$vsPath\VC\Tools\MSVC\$vcTools\bin\Hostx64\x64"
          $sdkBin   = "$sdkRoot\bin\$sdkVer\x64"
          $incKm    = "$sdkRoot\Include\$sdkVer\km"
          $incShared= "$sdkRoot\Include\$sdkVer\shared"
          $incUcrt  = "$sdkRoot\Include\$sdkVer\ucrt"
          $incWdf   = "$sdkRoot\Include\wdf\kmdf\1.33"
          $incVc    = "$vsPath\VC\Tools\MSVC\$vcTools\include"
          $libKm    = "$sdkRoot\Lib\$sdkVer\km\x64"
          $libUcrt  = "$sdkRoot\Lib\$sdkVer\ucrt\x64"
          $libVc    = "$vsPath\VC\Tools\MSVC\$vcTools\lib\x64"

          # Export as environment variables for later steps
          "VCBIN=$vcBin"         | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SDKBIN=$sdkBin"       | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "INC_KM=$incKm"        | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "INC_SHARED=$incShared"| Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "INC_UCRT=$incUcrt"    | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "INC_WDF=$incWdf"      | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "INC_VC=$incVc"        | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LIB_KM=$libKm"        | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LIB_UCRT=$libUcrt"    | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LIB_VC=$libVc"        | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SDK_VER=$sdkVer"      | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VS_PATH=$vsPath"      | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "Build environment configured."
          Write-Host "WDF headers at: $incWdf"

      # ------------------------------------------------------------------
      # Step 4: Build the kernel driver (cacheflt.sys) with cl.exe directly
      # ------------------------------------------------------------------
      - name: Build driver (cacheflt.sys)
        shell: cmd
        run: |
          set "PATH=%VCBIN%;%SDKBIN%;%PATH%"
          set "INCLUDE=%INC_VC%;%INC_KM%;%INC_SHARED%;%INC_UCRT%;%INC_WDF%"
          set "LIB=%LIB_KM%;%LIB_UCRT%;%LIB_VC%"
          cl /nologo /O2 /Gs- /kernel /I shared ^
            /D_KERNEL_MODE /DNDEBUG ^
            /c driver\*.c
          if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%
          link /nologo /driver /subsystem:native ^
            ntoskrnl.lib wdfldr.lib wdmsec.lib ^
            /out:cacheflt.sys ^
            *.obj
          if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%
          echo cacheflt.sys built successfully.

      # ------------------------------------------------------------------
      # Step 5: Build the management tool (cachectl.exe)
      #
      # User-mode app — much simpler than the driver. Uses env vars from step 3.
      # ------------------------------------------------------------------
      - name: Build manager (cachectl.exe)
        shell: cmd
        run: |
          set PATH=%VCBIN%;%SDKBIN%;%PATH%
          cl /nologo /O2 /I shared /DUNICODE /D_UNICODE ^
            /Fe:cachectl.exe ^
            manager\main.c ^
            /link kernel32.lib advapi32.lib user32.lib
          if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%
          echo cachectl.exe built successfully.

      # ------------------------------------------------------------------
      # Step 6: Verify build outputs
      # ------------------------------------------------------------------
      - name: Verify build outputs
        shell: pwsh
        run: |
          Write-Host "Checking build outputs..."
          $sys = Get-ChildItem -Recurse -Filter "cacheflt.sys" | Select -First 1
          $exe = Get-ChildItem -Recurse -Filter "cachectl.exe" | Select -First 1

          if (-not $sys) { Write-Error "cacheflt.sys not found!"; exit 1 }
          if (-not $exe) { Write-Error "cachectl.exe not found!"; exit 1 }

          Write-Host ""
          Write-Host "================================================"
          Write-Host " BUILD SUCCESSFUL"
          Write-Host "================================================"
          Write-Host "  cacheflt.sys : $($sys.FullName) ($('{0:N0}' -f $sys.Length) bytes)"
          Write-Host "  cachectl.exe : $($exe.FullName) ($('{0:N0}' -f $exe.Length) bytes)"
          Write-Host "================================================"

      # ------------------------------------------------------------------
      # Step 7: Upload artifacts (available from Actions summary page)
      #
      # GitHub retains artifacts for 90 days by default.
      # Download from: Actions → <this run> → Artifacts section
      # ------------------------------------------------------------------
      - name: Upload cacheflt.sys
        uses: actions/upload-artifact@v4
        with:
          name: cacheflt-driver
          path: |
            **/cacheflt.sys
            driver/cacheflt.inf

      - name: Upload cachectl.exe
        uses: actions/upload-artifact@v4
        with:
          name: cachectl-manager
          path: |
            **/cachectl.exe

      - name: Upload installer scripts
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: |
            installer/install.bat
            installer/uninstall.bat
