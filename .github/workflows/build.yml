# ---------------------------------------------------------------------------
# WinCache CI — Build kernel driver (cacheflt.sys) and management tool
#
# Triggered on push/PR to main, or manually via the "Actions" tab.
# Downloads compiled artifacts from the summary page after the build finishes.
# ---------------------------------------------------------------------------

name: Build WinCache

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:   # allow manual trigger from Actions tab

jobs:
  build:
    name: Build (x64 Release)
    runs-on: windows-2022

    steps:
      # ------------------------------------------------------------------
      # Step 1: Checkout source code
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Step 2: Setup MSBuild (already on the runner, but this ensures PATH)
      # ------------------------------------------------------------------
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # ------------------------------------------------------------------
      # Step 3: Install the Windows Driver Kit (WDK)
      #
      # The WDK is required to build kernel drivers with the
      # "WindowsKernelModeDriver10.0" MSBuild platform toolset.
      #
      # Strategy (tried in order):
      #   1. Check if already installed on the runner
      #   2. Chocolatey (most reliable for automated installs)
      #   3. Direct MSI download with PE validation
      # ------------------------------------------------------------------
      - name: Install WDK
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          # Check if WDK is already installed
          $wdkRoot = "${env:ProgramFiles(x86)}\Windows Kits\10"
          if (Test-Path "$wdkRoot\Include\10.0.*\km\wdm.h") {
            Write-Host "WDK already installed at $wdkRoot"
            Get-ChildItem "$wdkRoot\Include" -Directory | ForEach-Object { Write-Host "  SDK/WDK version: $($_.Name)" }
            exit 0
          }

          # Try chocolatey — the most reliable method for CI
          Write-Host "Installing WDK via Chocolatey..."
          choco install windowsdriverkit -y --no-progress --limit-output --timeout 600
          if ($LASTEXITCODE -eq 0) {
            Write-Host "WDK installed successfully via Chocolatey."
            exit 0
          }
          Write-Host "Chocolatey failed (exit code $LASTEXITCODE), trying direct download..."

          # Fallback: direct download from Microsoft
          $wdkUrl = "https://go.microsoft.com/fwlink/?linkid=2291857"
          $wdkExe = "$env:TEMP\wdksetup.exe"

          Write-Host "Downloading from $wdkUrl ..."
          Invoke-WebRequest -Uri $wdkUrl -OutFile $wdkExe -UseBasicParsing `
            -MaximumRedirection 10 -TimeoutSec 300

          # Validate the download — must start with MZ (PE executable)
          $bytes = [System.IO.File]::ReadAllBytes($wdkExe)
          $size = $bytes.Length
          Write-Host "Downloaded $size bytes"
          if ($size -lt 1000000) {
            Write-Error "Downloaded file is too small ($size bytes) — likely a redirect/error page, not the WDK installer"
            Write-Host "First 500 bytes (hex): $([BitConverter]::ToString($bytes[0..499]))"
            exit 1
          }
          # Check MZ signature
          if ($bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
            Write-Error "Downloaded file is not a PE executable — bad magic bytes"
            exit 1
          }

          Write-Host "Running WDK installer..."
          $proc = Start-Process -FilePath $wdkExe `
            -ArgumentList "/quiet","/norestart" `
            -Wait -PassThru -NoNewWindow
          if ($proc.ExitCode -ne 0) {
            Write-Error "WDK installer failed with exit code $($proc.ExitCode)"
            exit 1
          }
          Write-Host "WDK installed successfully via direct download."

      # ------------------------------------------------------------------
      # Step 4: Build the complete solution
      #
      # WinCache.sln builds both:
      #   - cacheflt.sys  (kernel driver)
      #   - cachectl.exe  (management tool)
      # ------------------------------------------------------------------
      - name: Build solution
        run: |
          msbuild WinCache.sln `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:WindowsTargetPlatformVersion=10.0 `
            /m `
            /v:minimal

      # ------------------------------------------------------------------
      # Step 5: Verify outputs exist
      # ------------------------------------------------------------------
      - name: Verify build outputs
        shell: pwsh
        run: |
          Write-Host "Checking build outputs..."
          $sys = Get-ChildItem -Recurse -Filter "cacheflt.sys" | Select -First 1
          $exe = Get-ChildItem -Recurse -Filter "cachectl.exe" | Select -First 1

          if (-not $sys) { Write-Error "cacheflt.sys not found!"; exit 1 }
          if (-not $exe) { Write-Error "cachectl.exe not found!"; exit 1 }

          Write-Host ""
          Write-Host "================================================"
          Write-Host " BUILD SUCCESSFUL"
          Write-Host "================================================"
          Write-Host "  cacheflt.sys : $($sys.FullName) ($('{0:N0}' -f $sys.Length) bytes)"
          Write-Host "  cachectl.exe : $($exe.FullName) ($('{0:N0}' -f $exe.Length) bytes)"
          Write-Host "================================================"

      # ------------------------------------------------------------------
      # Step 6: Upload artifacts (available from Actions summary page)
      #
      # GitHub retains artifacts for 90 days by default.
      # Download from: Actions → <this run> → Artifacts section
      # ------------------------------------------------------------------
      - name: Upload cacheflt.sys
        uses: actions/upload-artifact@v4
        with:
          name: cacheflt-driver
          path: |
            **/cacheflt.sys
            **/cacheflt.pdb
            driver/cacheflt.inf

      - name: Upload cachectl.exe
        uses: actions/upload-artifact@v4
        with:
          name: cachectl-manager
          path: |
            **/cachectl.exe
            **/cachectl.pdb

      - name: Upload installer scripts
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: |
            installer/install.bat
            installer/uninstall.bat
