# ---------------------------------------------------------------------------
# WinCache CI — Build kernel driver (cacheflt.sys) and management tool
# ---------------------------------------------------------------------------
name: Build WinCache

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build (x64 Release)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Install WDK — tried 3 ways, in order of reliability:
      #   1. VS installer (add WDK workload to existing VS)
      #   2. winget
      #   3. Direct MSI download
      # ------------------------------------------------------------------
      - name: Install WDK
        shell: pwsh
        run: |
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          $wdkCheck = Join-Path $vsPath "MSBuild\Microsoft\VC\v170\Microsoft.DriverKit.Defaults.props"

          if (Test-Path $wdkCheck) {
            Write-Host "::notice::WDK already installed"
            exit 0
          }

          # Method 1: VS installer
          Write-Host "Installing WDK via VS installer..."
          $vsInstaller = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          $proc = Start-Process -FilePath $vsInstaller -ArgumentList @(
            "modify",
            "--installPath", $vsPath,
            "--add", "Microsoft.VisualStudio.Component.Windows11WDK.24H2",
            "--quiet",
            "--norestart"
          ) -Wait -PassThru -NoNewWindow

          Write-Host "VS installer exit code: $($proc.ExitCode)"

          if (Test-Path $wdkCheck) {
            Write-Host "::notice::WDK installed via VS installer"
            exit 0
          }

          # Method 2: try the non-versioned component ID
          Write-Host "Trying alternative component ID..."
          $proc = Start-Process -FilePath $vsInstaller -ArgumentList @(
            "modify",
            "--installPath", $vsPath,
            "--add", "Microsoft.VisualStudio.Component.Windows11WDK",
            "--quiet",
            "--norestart"
          ) -Wait -PassThru -NoNewWindow

          if (Test-Path $wdkCheck) {
            Write-Host "::notice::WDK installed via VS installer (alt ID)"
            exit 0
          }

          # Method 3: winget
          Write-Host "Trying winget..."
          winget install --id Microsoft.WindowsWDK --exact --silent --accept-source-agreements --accept-package-agreements
          if ($LASTEXITCODE -eq 0 -and (Test-Path $wdkCheck)) {
            Write-Host "::notice::WDK installed via winget"
            exit 0
          }

          # Method 4: Direct download
          Write-Host "Trying direct MSI download..."
          $url = "https://go.microsoft.com/fwlink/?linkid=2291857"
          $out = "$env:TEMP\wdksetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing -MaximumRedirection 10
          $size = (Get-Item $out).Length
          Write-Host "Downloaded $size bytes"
          if ($size -lt 5000000) {
            Write-Host "::error::WDK download too small ($size bytes), probably redirect failed"
            exit 1
          }
          Start-Process -FilePath $out -ArgumentList "/quiet","/norestart" -Wait -NoNewWindow

          if (-not (Test-Path $wdkCheck)) {
            Write-Host "::error::All WDK install methods failed"
            Get-ChildItem "$vsPath\MSBuild\Microsoft\VC\v170" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
            exit 1
          }
          Write-Host "::notice::WDK installed via MSI"

      # ------------------------------------------------------------------
      # Build using MSBuild (now that WDK is installed)
      # ------------------------------------------------------------------
      - name: Build
        run: |
          msbuild WinCache.sln /p:Configuration=Release /p:Platform=x64 /m /v:minimal

      # ------------------------------------------------------------------
      # Verify
      # ------------------------------------------------------------------
      - name: Verify
        shell: pwsh
        run: |
          $sys = Get-ChildItem -Recurse -Filter "cacheflt.sys" | Select -First 1
          $exe = Get-ChildItem -Recurse -Filter "cachectl.exe" | Select -First 1
          if (-not $sys) { Write-Error "cacheflt.sys not found"; exit 1 }
          if (-not $exe) { Write-Error "cachectl.exe not found"; exit 1 }
          Write-Host "SUCCESS: cacheflt.sys ($('{0:N0}' -f $sys.Length) bytes)"
          Write-Host "SUCCESS: cachectl.exe ($('{0:N0}' -f $exe.Length) bytes)"

      # ------------------------------------------------------------------
      # Upload
      # ------------------------------------------------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wincache-build
          path: |
            **/cacheflt.sys
            **/cachectl.exe
            driver/cacheflt.inf
            installer/*.bat
