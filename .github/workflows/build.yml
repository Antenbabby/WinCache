# ---------------------------------------------------------------------------
# WinCache CI — Build kernel driver (cacheflt.sys) and management tool
#
# Triggered on push/PR to main, or manually via the "Actions" tab.
# Downloads compiled artifacts from the summary page after the build finishes.
# ---------------------------------------------------------------------------

name: Build WinCache

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:   # allow manual trigger from Actions tab

jobs:
  build:
    name: Build (x64 Release)
    runs-on: windows-2022

    steps:
      # ------------------------------------------------------------------
      # Step 1: Checkout source code
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Step 2: Setup MSBuild (already on the runner, but this ensures PATH)
      # ------------------------------------------------------------------
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # ------------------------------------------------------------------
      # Step 3: Install the Windows Driver Kit (WDK)
      #
      # The WDK is required for the "WindowsKernelModeDriver10.0" MSBuild
      # platform toolset. Without it, MSBuild cannot compile kernel drivers.
      #
      # NOTE: The runner may have SDK headers (e.g. wdm.h) but NOT the WDK
      # MSBuild toolset. We must install the full WDK regardless.
      # ------------------------------------------------------------------
      - name: Install WDK
        shell: pwsh
        run: |
          # Check if the WDK MSBuild toolset exists (not just headers)
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -property installationPath
          $wdkTargets = Join-Path $vsPath "MSBuild\Microsoft\VC\v170\Microsoft.DriverKit.Defaults.props"
          if (Test-Path $wdkTargets) {
            Write-Host "WDK MSBuild toolset already installed at $wdkTargets"
            exit 0
          }
          Write-Host "WDK MSBuild toolset NOT found (checked: $wdkTargets)"
          Write-Host "Headers existing is NOT enough — must install full WDK."

          # Install WDK via Chocolatey
          Write-Host "Installing WDK via Chocolatey (this takes a few minutes)..."
          choco install windowsdriverkit -y --no-progress --limit-output --timeout 900
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Chocolatey WDK install failed with exit code $LASTEXITCODE"
            exit 1
          }
          Write-Host "WDK installed successfully."

      # ------------------------------------------------------------------
      # Step 4: Build the kernel driver (cacheflt.sys)
      # ------------------------------------------------------------------
      - name: Build driver (cacheflt.sys)
        run: |
          msbuild driver\cacheflt.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /m `
            /v:minimal

      # ------------------------------------------------------------------
      # Step 5: Build the management tool (cachectl.exe)
      #
      # We use cl.exe directly to avoid MSBuild toolset version issues.
      # The VS install path and VC tools are located via vswhere.
      # ------------------------------------------------------------------
      - name: Build manager (cachectl.exe)
        shell: pwsh
        run: |
          # Find Visual Studio
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -property installationPath
          Write-Host "Visual Studio: $vsPath"

          # Find the VC tools version
          $vcToolsVersion = Get-ChildItem "$vsPath\VC\Tools\MSVC" -Directory `
            | Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty Name
          Write-Host "VC Tools version: $vcToolsVersion"

          # Set up PATH for cl.exe and friends
          $vcBin = "$vsPath\VC\Tools\MSVC\$vcToolsVersion\bin\Hostx64\x64"

          # Find the latest Windows SDK version
          $sdkRoot = "${env:ProgramFiles(x86)}\Windows Kits\10"
          $sdkVer = Get-ChildItem "$sdkRoot\Include" -Directory `
            | Where-Object { $_.Name -match '^10\.0\.\d+\.\d+$' } `
            | Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty Name
          Write-Host "Windows SDK version: $sdkVer"

          $sdkBin = "$sdkRoot\bin\$sdkVer\x64"
          $sdkInclude = "$sdkRoot\Include\$sdkVer"
          $sdkLib = "$sdkRoot\Lib\$sdkVer"
          $ucrtInclude = "$sdkInclude\ucrt"
          $ucrtLib = "$sdkLib\ucrt\x64"

          $vcBase = "$vsPath\VC\Tools\MSVC\$vcToolsVersion"
          $env:PATH = "$vcBin;$sdkBin;$env:PATH"
          $env:INCLUDE = "$vcBase\include;$sdkInclude;$ucrtInclude"
          $env:LIB = "$vcBase\lib\x64;$sdkLib;$ucrtLib"

          Write-Host "Compiler: $(Get-Command cl.exe | Select -ExpandProperty Source)"

          # Build
          New-Item -ItemType Directory -Force -Path bin\x64\Release | Out-Null
          cl /nologo /O2 /I shared /DUNICODE /D_UNICODE /Fe:bin\x64\Release\cachectl.exe manager\main.c /link kernel32.lib advapi32.lib user32.lib
          if ($LASTEXITCODE -ne 0) { Write-Error "cl.exe failed"; exit 1 }
          Write-Host "cachectl.exe built successfully."

      # ------------------------------------------------------------------
      # Step 6: Verify build outputs
      # ------------------------------------------------------------------
      - name: Verify build outputs
        shell: pwsh
        run: |
          Write-Host "Checking build outputs..."
          $sys = Get-ChildItem -Recurse -Filter "cacheflt.sys" | Select -First 1
          $exe = Get-ChildItem -Recurse -Filter "cachectl.exe" | Select -First 1

          if (-not $sys) { Write-Error "cacheflt.sys not found!"; exit 1 }
          if (-not $exe) { Write-Error "cachectl.exe not found!"; exit 1 }

          Write-Host ""
          Write-Host "================================================"
          Write-Host " BUILD SUCCESSFUL"
          Write-Host "================================================"
          Write-Host "  cacheflt.sys : $($sys.FullName) ($('{0:N0}' -f $sys.Length) bytes)"
          Write-Host "  cachectl.exe : $($exe.FullName) ($('{0:N0}' -f $exe.Length) bytes)"
          Write-Host "================================================"

      # ------------------------------------------------------------------
      # Step 7: Upload artifacts (available from Actions summary page)
      #
      # GitHub retains artifacts for 90 days by default.
      # Download from: Actions → <this run> → Artifacts section
      # ------------------------------------------------------------------
      - name: Upload cacheflt.sys
        uses: actions/upload-artifact@v4
        with:
          name: cacheflt-driver
          path: |
            **/cacheflt.sys
            driver/cacheflt.inf

      - name: Upload cachectl.exe
        uses: actions/upload-artifact@v4
        with:
          name: cachectl-manager
          path: |
            **/cachectl.exe

      - name: Upload installer scripts
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: |
            installer/install.bat
            installer/uninstall.bat
